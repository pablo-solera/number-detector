name: Build Windows EXE and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Set version from pyproject
        run: |
          $version = python -c "import tomllib; print('v' + tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])"
          "VERSION=$version" >> $env:GITHUB_ENV
          "EXE_NAME=DetectorNumeros-$version.exe" >> $env:GITHUB_ENV

      - name: Build EXE
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --windowed `
            --name "DetectorNumeros-${{ env.VERSION }}" `
            --icon="img/icon.ico" `
            "src/number_detector/__main__.py"

      - name: Generate Changelog
        id: changelog
        run: |
          git fetch --tags
          $lastTag = git describe --tags --abbrev=0 "${{ github.sha }}^" 2>$null
          if ($LASTEXITCODE -eq 0) {
            $log = git log "$lastTag..${{ github.sha }}" --pretty=format:"- %s"
          } else {
            $log = git log "${{ github.sha }}" --pretty=format:"- %s"
          }
          "CHANGELOG<<EOF" >> $env:GITHUB_ENV
          $log >> $env:GITHUB_ENV
          "EOF" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body: ${{ env.CHANGELOG }}
          files: dist/${{ env.EXE_NAME }}
