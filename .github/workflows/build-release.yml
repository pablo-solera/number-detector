name: Build Windows EXE and Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Set version from pyproject
        run: |
          $version = python -c "import tomllib; print('v' + tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])"
          "VERSION=$version" >> $env:GITHUB_ENV
          "EXE_NAME=DetectorNumeros-$version.exe" >> $env:GITHUB_ENV

      - name: Generate Changelog
        run: |
          git fetch --tags
          $lastTag = git tag --sort=-creatordate | Where-Object { $_ -ne "${{ env.VERSION }}" } | Select-Object -First 1
          if ($lastTag) {
            $log = git log "$lastTag..${{ github.sha }}" --pretty=format:"- %s"
          } else {
            $log = git log "${{ github.sha }}" --pretty=format:"- %s"
          }
          "CHANGELOG<<EOF" >> $env:GITHUB_ENV
          $log >> $env:GITHUB_ENV
          "EOF" >> $env:GITHUB_ENV

      - name: Create version tag
        run: |
          git fetch --tags
          if (git tag --list "${{ env.VERSION }}") {
            throw "Tag ${{ env.VERSION }} already exists. Update project.version in pyproject.toml before releasing."
          } else {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${{ env.VERSION }}"
            git push origin "${{ env.VERSION }}"
          }

      - name: Construir ejecutable con PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --windowed `
            --name "DetectorNumeros-${{ env.VERSION }}" `
            --icon="img/icon.ico" `
            "src/number_detector/__main__.py"

      - name: Verify executable
        run: |
          if (!(Test-Path "dist/${{ env.EXE_NAME }}")) {
            throw "Executable not found: dist/${{ env.EXE_NAME }}"
          }

      - name: Crear Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body: ${{ env.CHANGELOG }}
          files: dist/${{ env.EXE_NAME }}
