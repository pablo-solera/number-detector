name: Build Windows EXE and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Set version from pyproject
        run: |
          $version = python -c "import tomllib; print('v' + tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])"
          "VERSION=$version" >> $env:GITHUB_ENV
          "EXE_NAME=DetectorNumeros-$version.exe" >> $env:GITHUB_ENV

      - name: Construir ejecutable con PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --windowed `
            --name "DetectorNumeros-${{ env.VERSION }}" `
            --icon="img/icon.ico" `
            "src/number_detector/__main__.py"

      - name: Verificar ejecutable generado
        run: |
          git fetch --tags
          $lastTag = git describe --tags --abbrev=0 "${{ github.sha }}^" 2>$null
          if ($LASTEXITCODE -eq 0) {
            $log = git log "$lastTag..${{ github.sha }}" --pretty=format:"- %s"
          } else {
            $log = git log "${{ github.sha }}" --pretty=format:"- %s"
          }
          "CHANGELOG<<EOF" >> $env:GITHUB_ENV
          $log >> $env:GITHUB_ENV
          "EOF" >> $env:GITHUB_ENV

      - name: Crear archivo ZIP
        run: |
          Compress-Archive -Path dist\DetectorNumeros.exe -DestinationPath DetectorNumeros-${{ github.ref_name }}.zip

      - name: Subir artefacto
        uses: actions/upload-artifact@v6
        with:
          name: DetectorNumeros-${{ github.ref_name }}
          path: DetectorNumeros-${{ github.ref_name }}.zip
          retention-days: 90  # Mantener artefactos por 90 días

      - name: Crear Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body: ${{ env.CHANGELOG }}
          files: dist/${{ env.EXE_NAME }}
